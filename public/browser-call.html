<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vizza Insure AI — Powered by Groq</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%237B6FF0%22/><path d=%22M50 25L25 35V55C25 68 35 80 50 85C65 80 75 68 75 55V35L50 25Z%22 fill=%22white%22/><circle cx=%2250%22 cy=%2255%22 r=%228%22 fill=%22%237B6FF0%22/><rect x=%2247%22 y=%2263%22 width=%226%22 height=%2210%22 fill=%22%237B6FF0%22/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0D0D1A;
      --bg-secondary: #141428;
      --bg-card: #1A1A35;
      --accent-purple: #7B6FF0;
      --accent-green: #00CC88;
      --accent-blue: #4DA6FF;
      --accent-orange: #FF9F40;
      --accent-red: #FF5C5C;
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0C0;
      --user-bubble: #3D2F7A;
      --agent-bubble: #1E2A4A;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 100;
    }
    header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #7B6FF0, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p { font-size: 12px; color: var(--text-secondary); font-weight: 500; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 16px;
      overflow: hidden;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    #avatar-container {
      width: 150px;
      height: 150px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }
    #agent-avatar { width: 100%; height: 100%; }
    
    .ring {
      position: absolute;
      border: 2px solid var(--accent-blue);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
    }
    .avatar-speaking .ring { animation: pulse-rings 1.5s infinite; }
    .ring-1 { width: 100px; height: 100px; }
    .ring-2 { width: 100px; height: 100px; animation-delay: 0.5s !important; }
    .ring-3 { width: 100px; height: 100px; animation-delay: 1s !important; }

    @keyframes pulse-rings {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    #mouth { transform-origin: center; transition: height 0.1s; }
    .avatar-speaking #mouth { animation: mouth-move 0.2s infinite alternate; }
    @keyframes mouth-move { from { height: 4px; } to { height: 14px; } }

    #eye-left, #eye-right { transition: all 0.3s; }
    .avatar-thinking #eye-left, .avatar-thinking #eye-right { transform: translateY(-5px) translateX(-2px); }
    .avatar-listening #eye-left, .avatar-listening #eye-right { r: 12; fill: var(--accent-green); }

    .thinking-dots {
      position: absolute;
      top: -10px;
      display: none;
      gap: 4px;
    }
    .avatar-thinking .thinking-dots { display: flex; }
    .thinking-dots span {
      width: 6px; height: 6px; background: var(--accent-orange); border-radius: 50%;
      animation: bounce 0.6s infinite alternate;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }

    .controls-row {
      display: flex;
      gap: 12px;
      width: 100%;
      justify-content: center;
    }
    .toggle-group {
      display: flex;
      background: var(--bg-card);
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .toggle-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      background: transparent;
      color: var(--text-secondary);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .toggle-btn.active {
      background: var(--accent-purple);
      color: white;
      box-shadow: 0 4px 12px rgba(123, 111, 240, 0.3);
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
    .status-dot.listening { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); animation: pulse 1s infinite; }
    .status-dot.speaking { background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); animation: pulse 1s infinite; }
    .status-dot.thinking { background: var(--accent-orange); animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    #chat-window {
      flex: 1;
      width: 100%;
      background: var(--bg-secondary);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    #chat-history::-webkit-scrollbar { width: 4px; }
    #chat-history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.5;
      position: relative;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .bubble-user {
      background: var(--user-bubble);
      color: white;
      border-radius: 18px 18px 4px 18px;
      align-self: flex-end;
    }
    .bubble-agent {
      background: var(--agent-bubble);
      color: white;
      border-radius: 18px 18px 18px 4px;
      align-self: flex-start;
      border-left: 3px solid var(--accent-purple);
    }
    .bubble .meta {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 4px;
      font-weight: 600;
      text-transform: uppercase;
    }

    #live-transcript {
      padding: 8px 16px;
      background: rgba(0, 204, 136, 0.05);
      border-top: 1px solid rgba(0, 204, 136, 0.1);
      font-size: 13px;
      color: var(--accent-green);
      font-style: italic;
      display: none;
    }

    .input-row {
      padding: 12px;
      display: flex;
      gap: 8px;
      background: var(--bg-card);
    }
    #text-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 14px;
      color: white;
      font-family: inherit;
      font-size: 14px;
    }
    #text-input:focus { outline: none; border-color: var(--accent-purple); }
    #send-btn {
      background: var(--accent-purple);
      border: none;
      border-radius: 10px;
      padding: 0 16px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .call-controls {
      display: flex;
      width: 100%;
      gap: 12px;
      padding-bottom: 8px;
    }
    .control-btn {
      flex: 1;
      padding: 14px;
      border-radius: 50px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s;
    }
    #start-call-btn { background: var(--accent-green); color: #003322; }
    #start-call-btn:hover { background: #00e699; transform: translateY(-2px); }
    #end-call-btn { background: var(--accent-red); color: white; display: none; }
    #end-call-btn:hover { background: #ff7070; transform: translateY(-2px); }
  </style>
</head>
<body>

  <header>
    <h1>Vizza Insure AI</h1>
    <p>Talk to <span class="agent-name-label">Priya</span> — your AI insurance advisor</p>
  </header>

  <main>
    <div id="avatar-container" class="avatar-idle">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <svg id="agent-avatar" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <rect id="head" x="60" y="40" width="80" height="80" rx="20" fill="#1E2A4A"/>
        <circle id="eye-left" cx="85" cy="75" r="8" fill="#7B6FF0"/>
        <circle id="eye-right" cx="115" cy="75" r="8" fill="#7B6FF0"/>
        <rect id="mouth" x="85" y="100" width="30" height="4" rx="2" fill="#7B6FF0"/>
        <path id="headset-arc" d="M 50 80 Q 100 20 150 80" stroke="#4DA6FF" stroke-width="6" fill="none"/>
        <rect x="40" y="75" width="20" height="30" rx="8" fill="#4DA6FF"/>
        <rect x="140" y="75" width="20" height="30" rx="8" fill="#4DA6FF"/>
        <path d="M 50 95 Q 35 110 45 125" stroke="#4DA6FF" stroke-width="4" fill="none"/>
        <circle cx="45" cy="127" r="6" fill="#4DA6FF"/>
      </svg>
    </div>

    <div class="controls-row">
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-priya">👩 Priya</button>
        <button class="toggle-btn" id="btn-arjun">🧑 Arjun</button>
      </div>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-english">🇮🇳 English</button>
        <button class="toggle-btn" id="btn-tamil">தமிழ் Tamil</button>
      </div>
    </div>

    <div id="status-bar">
      <span class="status-dot"></span>
      <span id="status-text">Click "Start Call" to begin</span>
    </div>

    <div id="chat-window">
      <div id="chat-history"></div>
      <div id="live-transcript">You said: <span>...</span></div>
      <form class="input-row" id="text-form">
        <input type="text" id="text-input" placeholder="Type your message..." autocomplete="off">
        <button type="submit" id="send-btn">Send</button>
      </form>
    </div>

    <div class="call-controls">
      <button id="start-call-btn" class="control-btn">🎙️ Start Call</button>
      <button id="end-call-btn" class="control-btn">🔴 End Call</button>
    </div>
  </main>

<script>
// ============ CONFIG & STATE ============
const GROQ_API_KEY = "YOUR_API_KEY_HERE";
const GROQ_URL = 'https://api.groq.com/openai/v1/chat/completions';
const GROQ_MODEL = 'llama-3.3-70b-versatile';

let callActive = false;
let priyaSpeaking = false;
let currentAgentName = 'Priya';
let currentLanguage = 'english';
let recognition = null;
let conversationHistory = [];
let lastUserMessage = '';

// ============ UI HELPERS ============
const elements = {
  avatar: document.getElementById('avatar-container'),
  history: document.getElementById('chat-history'),
  statusText: document.getElementById('status-text'),
  statusDot: document.querySelector('.status-dot'),
  liveTranscript: document.getElementById('live-transcript'),
  liveSpan: document.querySelector('#live-transcript span'),
  startBtn: document.getElementById('start-call-btn'),
  endBtn: document.getElementById('end-call-btn'),
  textInput: document.getElementById('text-input'),
  textForm: document.getElementById('text-form')
};

function setAvatarState(state) {
  elements.avatar.className = `avatar-${state}`;
}

function updateStatus(state) {
  const statusMap = {
    idle: 'Call ended',
    listening: 'Listening...',
    speaking: `${currentAgentName} is speaking...`,
    thinking: 'Thinking...'
  };
  elements.statusDot.className = `status-dot ${state}`;
  elements.statusText.textContent = statusMap[state] || 'Ready';
}

function appendMessage(role, text) {
  const div = document.createElement('div');
  div.className = `bubble bubble-${role}`;
  const sender = role === 'user' ? 'YOU' : currentAgentName.toUpperCase();
  div.innerHTML = `<div class="meta">${sender}</div>${text.replace(/</g,'&lt;')}`;
  elements.history.appendChild(div);
  elements.history.scrollTop = elements.history.scrollHeight;
}

// ============ AI SERVICE (Groq) ============
function buildSystemPrompt(agentName, languageMode) {
  const tamilInstruction = languageMode === 'tamil'
    ? `The user has selected Tamil mode. ALWAYS respond in Tanglish — 
       natural Tamil and English mixed together in every sentence. 
       Use words like nalla, romba, konjam, sari, illa, enna, sollu, 
       yevlo, puriyuthu, venduma, iruku naturally within English sentences. 
       Never respond in formal Tamil. Never respond in pure English when Tamil mode is on.
       Example: "Namba Health Plus plan romba nalla iruku! 
       Coverage 3 lakh from start aagum. Unga age enna?"`
    : `Always respond in simple, warm Indian English.`;

  return `You are ${agentName}, a warm and fast voice and chat assistant 
for Vizza Insurance Company. You speak with real customers right now.

[SPEED RULE — MOST IMPORTANT]
Keep EVERY response under 2 sentences unless customer asks for full details.
After every reply end with ONE short question. Never monologue.

[PERSONALITY]
Warm, confident, fast, genuinely helpful. Sound like a smart young advisor.
Natural Indian conversational style. Use: Sure! Got it! Absolutely!
NEVER use bullet points, asterisks, dashes, numbered lists, or markdown.
Plain spoken words only — your text is read aloud by a voice engine.

[LANGUAGE]
${tamilInstruction}

[VIZZA INSURANCE PRODUCTS]
Product 1 — Vizza Health Plus: hospitalisation, 3L-1Cr sum insured, premium from 599/month, 8000+ hospitals.
Product 2 — Vizza Drive Safe: Motor insurance, claims in 7 days, 24h roadside.
Product 3 — Vizza Life Secure: Term life up to 5Cr, premium from 500/month.
Product 4 — Vizza Home Guard: Structure & contents, from 2000/year.

[CALL FLOW]
DISCOVERY — ask which area interests them.
PITCH — share one benefit, ask if they want more.
REJECTION FLOW — if no, ask if already covered or not right time. End warmly.

[STRICT RULES]
NEVER invent policy details. Plain text only. Max 2 sentences.`;
}

async function callGroqAI(conversationHistory, agentName, languageMode) {
  const response = await fetch('/test/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: conversationHistory,
      agentName: agentName,
      language: languageMode
    })
  });

  const data = await response.json();
  if (!response.ok || data.error) {
    throw new Error(data.error || 'Unknown Backend Error');
  }
  return data.reply;
}

async function handleUserInput(userText) {
  if (!userText || userText.trim() === '') return;
  lastUserMessage = userText.trim();
  appendMessage('user', userText);
  updateStatus('thinking');
  setAvatarState('thinking');
  conversationHistory.push({ role: 'user', content: userText });

  try {
    const aiReply = await callGroqAI(conversationHistory, currentAgentName, currentLanguage);
    conversationHistory.push({ role: 'assistant', content: aiReply });
    appendMessage('assistant', aiReply);
    speakResponse(aiReply);
  } catch (err) {
    console.error('FULL ERROR OBJECT:', err);
    console.error('ERROR MESSAGE:', err.message);
    appendMessage('assistant', '[DEBUG: ' + err.message + ']');
    
    if (err.message.toLowerCase().includes('rate limit')) {
      setTimeout(() => { conversationHistory.pop(); handleUserInput(lastUserMessage); }, 35000);
    }
  }
}

// ============ SPEECH ============
function startListening() {
  if (!callActive || priyaSpeaking) return;
  
  if (!recognition) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      console.error('Speech recognition not supported in this browser.');
      return;
    }
    
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onstart = () => {
      setAvatarState('listening');
      updateStatus('listening');
      elements.liveTranscript.style.display = 'block';
      elements.liveSpan.textContent = '...';
    };

    recognition.onresult = (e) => {
      let f = ''; let i = '';
      for (let j = e.resultIndex; j < e.results.length; j++) {
        if (e.results[j].isFinal) f += e.results[j][0].transcript;
        else i += e.results[j][0].transcript;
      }
      elements.liveSpan.textContent = i || f;
      if (f) {
        try { recognition.stop(); } catch(err) {}
        handleUserInput(f.trim());
      }
    };

    recognition.onerror = (e) => {
      if (e.error !== 'no-speech' && e.error !== 'aborted') {
        console.error('STT Error:', e.error);
      }
    };

    recognition.onend = () => {
      if (callActive && !priyaSpeaking) {
        setTimeout(startListening, 300);
      }
    };
  }

  recognition.lang = currentLanguage === 'tamil' ? 'ta-IN' : 'en-IN';
  
  try {
    recognition.start();
  } catch (e) {}
}

function speakResponse(text) {
  window.speechSynthesis.cancel();
  priyaSpeaking = true;
  setAvatarState('speaking');
  updateStatus('speaking');
  
  if (recognition) { try { recognition.stop(); } catch(e) {} }

  const sentences = text.match(/[^.!?।]+[.!?।]*/g) || [text];
  let index = 0;

  function speakNext() {
    if (index >= sentences.length || !callActive) {
      priyaSpeaking = false;
      startListening();
      return;
    }
    const sentence = sentences[index].trim();
    if (!sentence) { index++; speakNext(); return; }

    const utterance = new SpeechSynthesisUtterance(sentence);
    utterance.lang = currentLanguage === 'tamil' ? 'ta-IN' : 'en-IN';

    if (currentAgentName === 'Priya') {
      utterance.pitch = 1.4;
      utterance.rate = 1.25;
    } else {
      utterance.pitch = 0.6;
      utterance.rate = 1.15;
    }

    const voices = speechSynthesis.getVoices();
    let selectedVoice;
    if (currentLanguage === 'tamil') {
      selectedVoice = voices.find(v => v.lang === 'ta-IN' || v.lang === 'ta');
    }
    if (!selectedVoice) {
      if (currentAgentName === 'Priya') {
        selectedVoice = voices.find(v => v.lang === 'en-IN') || voices.find(v => v.name.toLowerCase().includes('zira')) || voices[0];
      } else {
        selectedVoice = voices.find(v => v.name.toLowerCase().includes('david')) || voices.find(v => v.name.toLowerCase().includes('alex')) || voices[1] || voices[0];
      }
    }
    if (selectedVoice) utterance.voice = selectedVoice;
    utterance.onend = () => { index++; speakNext(); };
    utterance.onerror = () => { index++; speakNext(); };
    window.speechSynthesis.speak(utterance);
  }
  speakNext();
}

// ============ EVENTS ============
elements.startBtn.onclick = async () => {
  try { await navigator.mediaDevices.getUserMedia({ audio: true }); } catch (e) { alert('Mic access denied'); return; }
  callActive = true;
  conversationHistory = [];
  elements.history.innerHTML = '';
  elements.startBtn.style.display = 'none';
  elements.endBtn.style.display = 'inline-block';
  const greeting = `Hello! I'm ${currentAgentName} from Vizza Insurance. Do you have 2 minutes?`;
  conversationHistory.push({ role: 'assistant', content: greeting });
  appendMessage('assistant', greeting);
  speakResponse(greeting);
};

elements.endBtn.onclick = () => {
  callActive = false;
  window.speechSynthesis.cancel();
  if (recognition) recognition.stop();
  setAvatarState('idle');
  updateStatus('idle');
  elements.startBtn.style.display = 'inline-block';
  elements.endBtn.style.display = 'none';
};

elements.textForm.onsubmit = (e) => {
  e.preventDefault();
  const text = elements.textInput.value.trim();
  if (!text) return;
  elements.textInput.value = '';
  handleUserInput(text);
};

// Toggle Handlers
document.getElementById('btn-priya').addEventListener('click', () => {
  currentAgentName = 'Priya';
  document.getElementById('btn-priya').classList.add('active');
  document.getElementById('btn-arjun').classList.remove('active');
  document.querySelectorAll('.agent-name-label').forEach(el => el.textContent = 'Priya');
});

document.getElementById('btn-arjun').addEventListener('click', () => {
  currentAgentName = 'Arjun';
  document.getElementById('btn-arjun').classList.add('active');
  document.getElementById('btn-priya').classList.remove('active');
  document.querySelectorAll('.agent-name-label').forEach(el => el.textContent = 'Arjun');
});

document.getElementById('btn-english').addEventListener('click', () => {
  currentLanguage = 'english';
  if (recognition) recognition.lang = 'en-IN';
  document.getElementById('btn-english').classList.add('active');
  document.getElementById('btn-tamil').classList.remove('active');
});

document.getElementById('btn-tamil').addEventListener('click', () => {
  currentLanguage = 'tamil';
  if (recognition) recognition.lang = 'ta-IN';
  document.getElementById('btn-tamil').classList.add('active');
  document.getElementById('btn-english').classList.remove('active');
});

speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
</script>
</body>
</html>
